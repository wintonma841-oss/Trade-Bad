// ── End-game objective scoring ────────────────────────────────
function applyEndGameObjectives(players,hands,g){
  const notes=[];
  const pids=Object.keys(players);
  pids.forEach(id=>{
    const p=players[id];
    const hand=hands[id]||[];
    const ot=p.objTrack||{};

    // ── Universal end-game card scoring ───────────────────────────
    let cardPts=0;const cardLog=[];
    hand.forEach(c=>{
      if(c.epv){cardPts+=c.epv;cardLog.push(`${c.n}+${c.epv}`);}
      if(c.isTextile){const v=c.textileUsed?2:5;cardPts+=v;cardLog.push(`Textile+${v}`);}
    });
    // Gov Bond: 4pts each if clean record (investor gets their own bonus instead)
    if(p.obj!=='investor'){
      hand.forEach(c=>{if(c.isGB&&(p.cr||0)===0){cardPts+=4;cardLog.push('GovBond+4');}});
    }
    if(cardPts){p.pts+=cardPts;notes.push(`${p.name} cards: +${cardPts}pts (${cardLog.join(', ')})`);}

    switch(p.obj){
      case'luxury':{
        let b=0;hand.forEach(c=>{if(c.bg==='silver')b+=2;if(c.bg==='gold')b+=4;});
        if(b){p.pts+=b;notes.push(`${p.name} (Luxury Enthusiast): +${b}pts`);}break;
      }
      case'merchant':{
        const u=Object.keys(ot.tWith||{}).length;
        if(u){p.pts+=u;notes.push(`${p.name} (Merchant): +${u}pts`);}break;
      }
      case'rebel':{
        const eli=pids.filter(x=>x!==id&&players[x].status==='eliminated').length;
        if(eli){const b=eli*4;p.pts+=b;notes.push(`${p.name} (Worker Rebel): +${b}pts`);}break;
      }
      case'monopolist':{
        const hC=hand.some(c=>c.n==='Coal'),hS=hand.some(c=>c.n==='Steel');
        const hO=hand.some(c=>c.n==='Oil'||c.n==='Oil Bond');
        if(hC&&hS&&hO){p.objWin=true;notes.push(`${p.name} (Monopolist): WINS OUTRIGHT!`);}break;
      }
      case'thrifter':{
        if(ot.thrift){notes.push(`${p.name} (Thrifter): +${ot.thrift}pts from trades`);}break;
      }
      case'politician':{
        if(ot.decGood){notes.push(`${p.name} (Politician): +${(ot.decGood)*2}pts from declines`);}break;
      }
      case'cartel':{
        if(ot.cartel){notes.push(`${p.name} (Cartel): +${(ot.cartel)*3}pts from scams`);}break;
      }
      case'vigilante':{
        const cr3=g.thursdayCR||{};
        const cr3p=Object.keys(cr3).filter(x=>x!==id);
        if(cr3p.length>0&&cr3p.every(x=>players[x]?.status==='eliminated')){
          p.objWin=true;notes.push(`${p.name} (Vigilante): WINS OUTRIGHT!`);
        }break;
      }
      case'farmer':{
        if(ot.agr){notes.push(`${p.name} (Farmer): +${(ot.agr)*3}pts from donations`);}break;
      }
      case'consumer':{
        if(ot.iDay!==undefined){notes.push(`${p.name} (Consumer): bonus pts applied daily`);}break;
      }
      case'collector':{
        let b=0;pids.forEach(x=>{if(x!==id&&(players[x].pts||0)<0)b+=Math.abs(players[x].pts);});
        if(b){p.pts+=b;notes.push(`${p.name} (Debt Collector): +${b}pts`);}break;
      }
      case'barber':{
        const days=Object.keys(ot.bDays||{}).length;
        if(days){notes.push(`${p.name} (Barber): +${days*3}pts from target trades`);}break;
      }
      case'hoarder':{
        const items=hand.filter(c=>c.t==='Item').length;
        if(items){const b=items*2;p.pts+=b;notes.push(`${p.name} (Hoarder): +${b}pts`);}break;
      }
      case'hustler':{
        if(Object.values(ot.tWith||{}).some(d=>d.length>=2)){
          notes.push(`${p.name} (Hustler): steals already applied`);}break;
      }
      case'investor':{
        let b=0;
        hand.forEach(c=>{
          if(c.isSk)b+=c.val||0;
          if(c.n==='Oil Bond')b+=6;
          if(c.isGB)b+=4;
        });
        if(b){p.pts+=b;notes.push(`${p.name} (Investor): +${b}pts`);}break;
      }
      case'immigrant':{
        if((p.cr||0)===0&&(p.pts||0)>=15){p.objWin=true;notes.push(`${p.name} (Immigrant): WINS OUTRIGHT!`);}break;
      }
      case'conartist':{
        const c=ot.conScams||0;if(c)notes.push(`${p.name} (Con Artist): +${c*4}pts from clean scams`);break;
      }
      case'lunatic':{
        const kills=ot.kills||0;if(kills){const b=kills*5;p.pts+=b;notes.push(`${p.name} (Lunatic): +${b}pts from ${kills} elimination(s)`);}break;
      }
      case'govagent':{
        const EVIL=['hustler','conartist','armsdealer','lunatic','cartel','rebel','assassin'];
        const deadEvil=pids.filter(x=>EVIL.includes(players[x].obj)&&players[x].status==='eliminated').length;
        if(deadEvil){const b=deadEvil*4;p.pts+=b;notes.push(`${p.name} (Government Agent): +${b}pts from ${deadEvil} dead evil player(s)`);}break;
      }
      case'armsdealer':{
        const sold=ot.weaponsSold||0;if(sold){const b=sold*3;p.pts+=b;notes.push(`${p.name} (Arms Dealer): +${b}pts from ${sold} weapon(s) sold`);}break;
      }
      case'assassin':{
        const targets=p.assassinTargets||[];
        const deadTargets=targets.filter(tid=>players[tid]?.status==='eliminated').length;
        if(deadTargets){const b=deadTargets*5;p.pts+=b;notes.push(`${p.name} (Assassin): +${b}pts from ${deadTargets} dead target(s)`);}break;
      }
      case'landlord':{
        const nd2=ot.noTradeDays||0;if(nd2){const b=nd2*2;p.pts+=b;notes.push(`${p.name} (Landlord): +${b}pts from ${nd2} no-trade player-days`);}break;
      }
      case'blacksmith':{
        const ct=ot.contracts||0;if(ct){const b=ct*3;p.pts+=b;notes.push(`${p.name} (Blacksmith): +${b}pts from ${ct} Trade card(s) in trades`);}break;
      }
      case'warden':{
        const arrested=pids.filter(x=>players[x].wasArrested).length;
        if(arrested){const b=arrested*4;p.pts+=b;notes.push(`${p.name} (Warden): +${b}pts from ${arrested} unique arrest(s)`);}break;
      }
      case'wholesaler':{
        const sd=ot.soloTradeDays||0;if(sd){const b=sd*2;p.pts+=b;notes.push(`${p.name} (Wholesaler): +${b}pts from ${sd} solo-trade day(s)`);}break;
      }
    }
    players[id]=p;
  });

  // Determine winners
  const active=pids.filter(id=>players[id].status!=='eliminated');
  const aliveWitches=active.filter(id=>players[id].isWitch);
  const aliveOutcasts=active.filter(id=>players[id].isOutcast);
  // Special roles win by their own conditions
  aliveWitches.forEach(id=>{players[id].winner=true;});
  aliveOutcasts.forEach(id=>{players[id].winner=true;});
  // Tighten win threshold to 20% if any special role survived
  const winThreshold=(aliveWitches.length||aliveOutcasts.length)?0.2:0.4;
  // Regular players (not witch, not outcast)
  const regularActive=active.filter(id=>!players[id].isWitch&&!players[id].isOutcast);
  const regularNonObj=regularActive.filter(id=>!players[id].objWin);
  regularNonObj.sort((a,b)=>(players[b].pts||0)-(players[a].pts||0));
  const topN=Math.ceil(regularNonObj.length*winThreshold);
  regularNonObj.slice(0,topN).forEach(id=>{players[id].winner=true;});
  regularActive.filter(id=>players[id].objWin).forEach(id=>{players[id].winner=true;});
  if(aliveWitches.length)notes.push(`🔮 Witches survived! ${aliveWitches.map(id=>players[id].name).join(', ')} win.`);
  if(aliveOutcasts.length)notes.push(`⚔ Outcast survived! ${aliveOutcasts.map(id=>players[id].name).join(', ')} win.`);
  if(aliveWitches.length||aliveOutcasts.length)notes.push(`Only top 20% of regular players win.`);
  const winNames=pids.filter(id=>players[id].winner).map(id=>players[id].name);
  if(winNames.length)notes.push(`❖ Winners: ${winNames.join(', ')}`);

  return notes;
}

// ── Bot system ─────────────────────────────────────────────────
const BOT_NAMES=['Ada','Barnaby','Cecil','Dorothy','Edmund','Florence','George','Harriet','Isaac','Jane'];

async function addBot(){
  const snap=await get(ref(DB,`games/${ROOM}`));
  const g=snap.val();
  const allP=Object.values(g.players||{});
  if(allP.length>=10){notify('Room is full (10 players max)');return;}
  const bots=allP.filter(p=>p.isBot);
  const name=BOT_NAMES[bots.length%BOT_NAMES.length];
  const botId='bot_'+Math.random().toString(36).slice(2,10);
  const order=allP.length;
  await update(ref(DB,`games/${ROOM}`),{
    [`players/${botId}`]:{name,pts:0,cr:0,status:'active',sick:false,tradedToday:false,order,isBot:true},
    [`hands/${botId}`]:[]
  });
}

async function removeBot(){
  const snap=await get(ref(DB,`games/${ROOM}`));
  const g=snap.val();
  const bots=Object.entries(g.players||{}).filter(([,p])=>p.isBot);
  if(!bots.length){notify('No bots to remove');return;}
  const [lastBotId]=bots[bots.length-1];
  const up={};
  up[`players/${lastBotId}`]=null;
  up[`hands/${lastBotId}`]=null;
  await update(ref(DB,`games/${ROOM}`),up);
}

async function pickDraftCard(uid){
  const snap=await get(ref(DB,`games/${ROOM}`));
  const g=snap.val();
  const draft=(g.cardDraft||{})[MY_ID];
  if(!draft)return;
  const picked=draft.find(c=>c.uid===uid);
  if(!picked)return;
  const hand=JSON.parse(JSON.stringify(g.hands[MY_ID]||[]));
  hand.push(picked);
  await update(ref(DB,`games/${ROOM}`),{[`hands/${MY_ID}`]:hand,[`cardDraft/${MY_ID}`]:null});
}

async function runBotTick(){
  if(!IS_HOST)return;
  const snap=await get(ref(DB,`games/${ROOM}`));
  if(!snap.exists())return;
  const g=snap.val();
  if(g.phase!=='playing')return;
  // Auto-pick draft cards for bots
  const draftEntries=Object.entries(g.cardDraft||{});
  for(const [botId,opts] of draftEntries){
    if(!g.players[botId]?.isBot||!opts?.length)continue;
    const picked=opts[0|Math.random()*opts.length];
    const botHand=JSON.parse(JSON.stringify(g.hands[botId]||[]));
    botHand.push(picked);
    await update(ref(DB,`games/${ROOM}`),{[`hands/${botId}`]:botHand,[`cardDraft/${botId}`]:null});
    return;
  }
  if(g.trade){
    const t=g.trade;
    const tgtIsBot=g.players[t.tgt]?.isBot;
    const initIsBot=g.players[t.init]?.isBot;
    if(t.phase==='invited'&&tgtIsBot){
      // Auto-accept the invitation on behalf of the bot
      await update(ref(DB,`games/${ROOM}`),{'trade/phase':'negotiating'});
      return;
    }
    if(t.phase==='negotiating'){
      // Step 1: ensure bot has written its lock
      if(tgtIsBot&&!t.tLocked){await botRespondToTrade(g);}
      else if(initIsBot&&!t.iLocked){
        await update(ref(DB,`games/${ROOM}`),{'trade/iLocked':true});
      }
      // Step 2: always re-read and execute if both locked (same tick as lock write)
      if(tgtIsBot||initIsBot){
        const freshSnap=await get(ref(DB,`games/${ROOM}`));
        const freshG=freshSnap.val();
        if(freshG.trade?.phase==='negotiating'&&freshG.trade?.iLocked&&freshG.trade?.tLocked){
          await executeTradeNow(freshG);
        }
      }
      return;
    }
  }
  if(!g.trade){
    const activeBots=Object.entries(g.players||{})
      .filter(([,p])=>p.isBot&&p.status==='active'&&!p.tradedToday);
    if(activeBots.length&&Math.random()<0.35){
      const [botId]=activeBots[Math.floor(Math.random()*activeBots.length)];
      await botInitiateTrade(g,botId);
    }
  }
}

async function botRespondToTrade(g){
  const t=g.trade;
  const botId=t.tgt;
  const bot=g.players[botId];
  const botHand=JSON.parse(JSON.stringify(g.hands[botId]||[]));
  const iHand=g.hands[t.init]||[];
  const offered=(t.iCards||[]).map(uid=>iHand.find(c=>c.uid===uid)).filter(Boolean);
  const offerVal=offered.reduce((s,c)=>s+(c.r||0),0)+(t.iPoints||0);
  if(offerVal<=0&&Math.random()<0.4){
    const pairKey=[t.init,t.tgt].sort().join('|');
    await update(ref(DB,`games/${ROOM}`),{'trade/phase':'resolved','trade/result':`${bot.name} declined.`,[`blockedPairs/${pairKey}`]:true});
    await pushNotif(`${bot.name} declined.`);
    return;
  }
  const tradeable=botHand.filter(c=>c.t!=='Action');
  const tOffer=tradeable.length&&Math.random()<0.5?[tradeable[0|Math.random()*tradeable.length]]:[];
  // Lock in bot's response; if initiator already locked, execute now
  await update(ref(DB,`games/${ROOM}`),{
    'trade/tCards':tOffer.map(c=>c.uid),'trade/tPoints':0,'trade/tLocked':true
  });
}

async function botInitiateTrade(g,botId){
  const bot=g.players[botId];
  const botHand=g.hands[botId]||[];
  const blocked=g.blockedPairs||{};
  const notBlocked=id=>!blocked[[botId,id].sort().join('|')];
  const humans=Object.entries(g.players||{})
    .filter(([id,p])=>!p.isBot&&p.status==='active'&&id!==botId&&notBlocked(id));
  const otherBots=Object.entries(g.players||{})
    .filter(([id,p])=>p.isBot&&p.status==='active'&&id!==botId&&!p.tradedToday&&notBlocked(id));
  // Prefer humans (80%), fall back to other bots if no humans or unlucky
  const useBot=(!humans.length)||(otherBots.length&&Math.random()<0.2);
  const pool=useBot?otherBots:humans;
  if(!pool.length)return;
  const [targetId,target]=pool[0|Math.random()*pool.length];
  if((bot.tradeAttemptsToday||0)>=3)return;
  const tradeable=botHand.filter(c=>c.t!=='Action');
  if(!tradeable.length)return;
  const numCards=Math.min(tradeable.length,Math.random()<0.3?2:1);
  const offered=[...tradeable].sort(()=>Math.random()-.5).slice(0,numCards);
  await update(ref(DB,`games/${ROOM}`),{[`players/${botId}/tradeAttemptsToday`]:(bot.tradeAttemptsToday||0)+1,trade:{
    init:botId,initName:bot.name,
    tgt:targetId,tgtName:target.name,
    phase:'invited',
    iCards:offered.map(c=>c.uid),iPoints:0,
    tCards:[],tPoints:0,
    iLocked:false,tLocked:false,
    revealed:{},richUncle:0,lawyer:false,result:null
  }});
  await pushNotif(`${bot.name} is proposing a trade with ${target.name}!`);
}
